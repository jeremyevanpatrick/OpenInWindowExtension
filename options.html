<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Extension Options</title>
    <style>
      body { font-family: sans-serif; padding: 24px; min-width: 280px; }
      label { display: flex; align-items: center; gap: 10px; font-size: 14px; cursor: pointer; }
      p { font-size: 12px; color: #666; margin: 8px 0 0 26px; }
    </style>
  </head>
  <body>
    <label>
      <input type="checkbox" id="alwaysTargetSecond">
      Always target second window
    </label>
    <p>When enabled, links will always open in the second window you opened, instead of showing a list of all windows.</p>
    <script src="options.js"></script>
  </body>
</html>
